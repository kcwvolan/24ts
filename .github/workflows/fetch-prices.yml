name: 每日行情快取更新

on:
  schedule:
    # 台灣時間 23:30（UTC 15:30）— 農業部收盤後約 2 小時
    - cron: "30 15 * * *"
  workflow_dispatch:   # 允許手動觸發

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write       # 部署 GitHub Pages 所需
      id-token: write    # OIDC 驗證所需

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 抓取行情資料
        run: python scripts/fetch_prices.py

      - name: 確認輸出（0 筆則中止，不覆蓋舊版）
        run: |
          python3 -c "
          import json, sys
          with open('docs/prices.json') as f:
              d = json.load(f)
          count = d.get('count', 0)
          print(f'updatedAt: {d[\"updatedAt\"]}')
          print(f'count: {count}')
          for p in d['prices'][:3]:
              print(p)
          if count == 0:
              print('❌ 本次抓取 0 筆，中止 deploy 以保留舊版資料')
              sys.exit(1)
          print(f'✅ {count} 筆，繼續 deploy')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
